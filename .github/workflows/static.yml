# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - 'train3/'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
        - name: Close Stale Issues
          uses: actions/stale@v10.2.0
          with:
            # Token for the repository. Can be passed in using `{{ secrets.GITHUB_TOKEN }}`.
            repo-token: # optional, default is ${{ github.token }}
            # The message to post on the issue when tagging it. If none provided, will not mark issues stale.
            stale-issue-message: # optional
            # The message to post on the pull request when tagging it. If none provided, will not mark pull requests stale.
            stale-pr-message: # optional
            # The message to post on the issue when closing it. If none provided, will not comment when closing an issue.
            close-issue-message: # optional
            # The message to post on the pull request when closing it. If none provided, will not comment when closing a pull requests.
            close-pr-message: # optional
            # The number of days old an issue or a pull request can be before marking it stale. Set to -1 to never mark issues or pull requests as stale automatically.
            days-before-stale: # optional, default is 60
            # The number of days old an issue can be before marking it stale. Set to -1 to never mark issues as stale automatically. Override "days-before-stale" option regarding only the issues.
            days-before-issue-stale: # optional
            # The number of days old a pull request can be before marking it stale. Set to -1 to never mark pull requests as stale automatically. Override "days-before-stale" option regarding only the pull requests.
            days-before-pr-stale: # optional
            # The number of days to wait to close an issue or a pull request after it being marked stale. Set to -1 to never close stale issues or pull requests.
            days-before-close: # optional, default is 7
            # The number of days to wait to close an issue after it being marked stale. Set to -1 to never close stale issues. Override "days-before-close" option regarding only the issues.
            days-before-issue-close: # optional
            # The number of days to wait to close a pull request after it being marked stale. Set to -1 to never close stale pull requests. Override "days-before-close" option regarding only the pull requests.
            days-before-pr-close: # optional
            # The label to apply when an issue is stale.
            stale-issue-label: # optional, default is Stale
            # The label to apply when an issue is closed.
            close-issue-label: # optional
            # The labels that mean an issue is exempt from being marked stale. Separate multiple labels with commas (eg. "label1,label2").
            exempt-issue-labels: # optional, default is 
            # The reason to use when closing an issue.
            close-issue-reason: # optional, default is not_planned
            # The label to apply when a pull request is stale.
            stale-pr-label: # optional, default is Stale
            # The label to apply when a pull request is closed.
            close-pr-label: # optional
            # The labels that mean a pull request is exempt from being marked as stale. Separate multiple labels with commas (eg. "label1,label2").
            exempt-pr-labels: # optional, default is 
            # The milestones that mean an issue or a pull request is exempt from being marked as stale. Separate multiple milestones with commas (eg. "milestone1,milestone2").
            exempt-milestones: # optional, default is 
            # The milestones that mean an issue is exempt from being marked as stale. Separate multiple milestones with commas (eg. "milestone1,milestone2"). Override "exempt-milestones" option regarding only the issues.
            exempt-issue-milestones: # optional, default is 
            # The milestones that mean a pull request is exempt from being marked as stale. Separate multiple milestones with commas (eg. "milestone1,milestone2"). Override "exempt-milestones" option regarding only the pull requests.
            exempt-pr-milestones: # optional, default is 
            # Exempt all issues and pull requests with milestones from being marked as stale. Default to false.
            exempt-all-milestones: # optional, default is false
            # Exempt all issues with milestones from being marked as stale. Override "exempt-all-milestones" option regarding only the issues.
            exempt-all-issue-milestones: # optional, default is 
            # Exempt all pull requests with milestones from being marked as stale. Override "exempt-all-milestones" option regarding only the pull requests.
            exempt-all-pr-milestones: # optional, default is 
            # Only issues or pull requests with all of these labels are checked if stale. Defaults to `` (disabled) and can be a comma-separated list of labels.
            only-labels: # optional, default is 
            # Only issues or pull requests with at least one of these labels are checked if stale. Defaults to `` (disabled) and can be a comma-separated list of labels.
            any-of-labels: # optional, default is 
            # Only issues with at least one of these labels are checked if stale. Defaults to `` (disabled) and can be a comma-separated list of labels. Override "any-of-labels" option regarding only the issues.
            any-of-issue-labels: # optional, default is 
            # Only pull requests with at least one of these labels are checked if stale. Defaults to `` (disabled) and can be a comma-separated list of labels. Override "any-of-labels" option regarding only the pull requests.
            any-of-pr-labels: # optional, default is 
            # Only issues with all of these labels are checked if stale. Defaults to `[]` (disabled) and can be a comma-separated list of labels. Override "only-labels" option regarding only the issues.
            only-issue-labels: # optional, default is 
            # Only pull requests with all of these labels are checked if stale. Defaults to `[]` (disabled) and can be a comma-separated list of labels. Override "only-labels" option regarding only the pull requests.
            only-pr-labels: # optional, default is 
            # The maximum number of operations per run, used to control rate limiting (GitHub API CRUD related).
            operations-per-run: # optional, default is 30
            # Remove stale labels from issues and pull requests when they are updated or commented on.
            remove-stale-when-updated: # optional, default is true
            # Remove stale labels from issues when they are updated or commented on. Override "remove-stale-when-updated" option regarding only the issues.
            remove-issue-stale-when-updated: # optional, default is 
            # Remove stale labels from pull requests when they are updated or commented on. Override "remove-stale-when-updated" option regarding only the pull requests.
            remove-pr-stale-when-updated: # optional, default is 
            # Run the processor in debug mode without actually performing any operations on live issues.
            debug-only: # optional, default is false
            # The order to get issues or pull requests. Defaults to false, which is descending.
            ascending: # optional, default is false
            # What to sort results by. Valid options are `created`, `updated`, and `comments`. Defaults to `created`.
            sort-by: # optional, default is created
            # Delete the git branch after closing a stale pull request.
            delete-branch: # optional, default is false
            # The date used to skip the stale action on issue/pull request created before it (ISO 8601 or RFC 2822).
            start-date: # optional, default is 
            # The assignees which exempt an issue or a pull request from being marked as stale. Separate multiple assignees with commas (eg. "user1,user2").
            exempt-assignees: # optional, default is 
            # The assignees which exempt an issue from being marked as stale. Separate multiple assignees with commas (eg. "user1,user2"). Override "exempt-assignees" option regarding only the issues.
            exempt-issue-assignees: # optional, default is 
            # The assignees which exempt a pull request from being marked as stale. Separate multiple assignees with commas (eg. "user1,user2"). Override "exempt-assignees" option regarding only the pull requests.
            exempt-pr-assignees: # optional, default is 
            # Exempt all issues and pull requests with assignees from being marked as stale. Default to false.
            exempt-all-assignees: # optional, default is false
            # Exempt all issues with assignees from being marked as stale. Override "exempt-all-assignees" option regarding only the issues.
            exempt-all-issue-assignees: # optional, default is 
            # Exempt all pull requests with assignees from being marked as stale. Override "exempt-all-assignees" option regarding only the pull requests.
            exempt-all-pr-assignees: # optional, default is 
            # Exempt draft pull requests from being marked as stale. Default to false.
            exempt-draft-pr: # optional, default is false
            # Display some statistics at the end regarding the stale workflow (only when the logs are enabled).
            enable-statistics: # optional, default is true
            # A comma delimited list of labels to add when an issue or pull request becomes unstale.
            labels-to-add-when-unstale: # optional, default is 
            # A comma delimited list of labels to remove when an issue or pull request becomes stale.
            labels-to-remove-when-stale: # optional, default is 
            # A comma delimited list of labels to remove when an issue or pull request becomes unstale.
            labels-to-remove-when-unstale: # optional, default is 
            # Any update (update/comment) can reset the stale idle time on the issues and pull requests.
            ignore-updates: # optional, default is false
            # Any update (update/comment) can reset the stale idle time on the issues. Override "ignore-updates" option regarding only the issues.
            ignore-issue-updates: # optional, default is 
            # Any update (update/comment) can reset the stale idle time on the pull requests. Override "ignore-updates" option regarding only the pull requests.
            ignore-pr-updates: # optional, default is 
            # Only the issues or the pull requests with an assignee will be marked as stale automatically.
            include-only-assigned: # optional, default is false
            # Only issues with a matching type are processed as stale/closed. Defaults to `[]` (disabled) and can be a comma-separated list of issue types.
            only-issue-types: # optional, default is 
                  
        - name: Lighthouse Check
          # You may pin to the exact commit or the version.
          # uses: foo-software/lighthouse-check-action@a80267da2e0244b8a2e457a8575fc47590615852
          uses: foo-software/lighthouse-check-action@v12.0.1
          with:
            # Legacy field (use "gitHubAccessToken"): Access token of a user to post PR comments.
            accessToken: # optional
            # Legacy field (use "fooApiToken"): The foo.software account API token found in the dashboard.
            apiToken: # optional
            # Legacy field (use "gitAuthor"): Used in Slack notifications, linking the authoring user to their GitHub profile. In a GitHub context you could use "github.actor".
            author: # optional
            # The AWS accessKeyId for an S3 bucket.
            awsAccessKeyId: # optional
            # The AWS Bucket for an S3 bucket.
            awsBucket: # optional
            # The AWS region for an S3 bucket.
            awsRegion: # optional
            # The AWS secretAccessKey for an S3 bucket.
            awsSecretAccessKey: # optional
            # Legacy field (use "gitBranch"): Used in Slack notifications. In a GitHub context you could use "github.ref".
            branch: # optional
            # An endpoint to post comments to. This is only needed if you want to trigger comments on 'push'. A 'pull_request' trigger does not require this to be set. Typically this will be from GitHub's API. Example: https://api.github.com/repos/:owner/:repo/commits/:commit_sha/comments.
            commentUrl: # optional
            # The device in which to run Lighthouse (either "desktop" or "mobile")
            device: # optional
            # Legacy field (use "device): The device in which to run Lighthouse (either "desktop" or "mobile")
            emulatedFormFactor: # optional
            # Stringified HTTP Header object key/value pairs to send in requests.
            extraHeaders: # optional
            # The foo.software account API token found in the dashboard.
            fooApiToken: # optional
            # Used in Slack notifications, linking the authoring user to their GitHub profile. In a GitHub context you could use 'github.actor'.
            gitAuthor: # optional
            # Used in Slack notifications. In a GitHub context you could use 'github.ref'.
            gitBranch: # optional
            # Access token of a user to post PR comments.
            gitHubAccessToken: # optional
            # A locale for Lighthouse reports. Example: ja
            locale: # optional
            # The maximum number of times to retry. Note: This is not supported when running against Foo's API as retry logic is already in place.
            maxRetries: # optional
            # An absolute directory path to output report. You can do this an an alternative or combined with an S3 upload.
            outputDirectory: # optional
            # A JSON file with config and option fields to override defaults.
            overridesJsonFile: # optional
            # If true and gitHubAccessToken is set scores will be posted as comments.
            prCommentEnabled: # optional
            # If true and PR comment options are set, new comments will be posted on every change vs only updating once comment with most recent scores.
            prCommentSaveOld: # optional
            # Used in Slack notifications. A git sha.
            sha: # optional
            # A Slack Incoming Webhook URL to send notifications to.
            slackWebhookUrl: # optional
            # An optional tag or name (example: "build #2" or "v0.0.2").
            tag: # optional
            # Lighthouse setting only used for local audits. See lighthouse-check NPM module comments for details.
            throttlingMethod: # optional
            # Lighthouse setting only used for local audits. See lighthouse-check NPM module comments for details.
            throttling: # optional
            # Minutes to timeout for remote runs. If "wait" option is "true" (it is by default), we wait for results. If this timeout is met before results are received an error is thrown.
            timeout: # optional
            # A comma-separated list of URLs (or page API tokens if running remotely).
            urls: # optional
            # An alternative way of passing URLs to Lighthouse Check to fulfill more advanced cases in which URLs have commas or you need to associate a URL with a Foo page token.
            urlsJson: # optional
            # If "true", print out steps and results to the console.
            verbose: # optional
            # If "true", waits for all audit results to be returned, otherwise URLs are only enqueued.
            wait: # optional
        - name: Image Actions
        # You may pin to the exact commit or the version.
        # uses: calibreapp/image-actions@f32575787d333b0579f0b7d506ff03be63a669d1
          uses: calibreapp/image-actions@1.4.1
          with:
            # The token that the action will use to create and update the pull request.
            GITHUB_TOKEN: # optional, default is ${{ github.token }}
            # JPEG quality level
            jpegQuality: # optional, default is 85
            # Use progressive (interlaced) scan for JPEG
            jpegProgressive: # optional, default is false
            # PNG quality level
            pngQuality: # optional, default is 80
            # WEBP quality level
            webpQuality: # optional, default is 85
            # AVIF quality level
            avifQuality: # optional, default is 75
            # Paths to ignore during search
            ignorePaths: # optional, default is node_modules/**
            # Images will be compressed. No commit, or comments will be added to your Pull Request
            compressOnly: # optional, default is false
            # Minimun percentage reduction to be committed
            minPctChange: # optional, default is 5
                            
        - name: Super-Linter
          # You may pin to the exact commit or the version.
          # uses: super-linter/super-linter@b92721f792f381cedc002ecdbb9847a15ece5bb8
          uses: super-linter/super-linter@v7.1.0
        - name: Secret Scanning
        # You may pin to the exact commit or the version.
        # uses: geekNero/secret-scanning@f10326539d3d102a31f70586c6f15cdd3fd6677f
          uses: geekNero/secret-scanning@v1
          with:
          # Comma-separated list of files to exclude
            file-exclusions: # optional, default is 0
          # Comma-separated list of hashes to exclude
            hash-exclusions: # optional, default is 0
          # Comma-separated list of plugins to exclude
            plugin-exclusions: # optional, default is 0
          # Space-separated list of custom-regexes to include
            custom-regexes: # optional, default is 0
                
        - name: Security Scan
          run: |
            if [ -f ".env" ]; then echo "Waduh! Ada file .env kedorong ke repo!"; exit 1; fi
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup Pages
          uses: actions/configure-pages@v5
        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:
            # Upload entire repository
            path: './train3'
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v5
